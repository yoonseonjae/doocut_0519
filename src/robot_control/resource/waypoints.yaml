# waypoints.yaml
# 인생DOO컷 로봇 모션 좌표 (2026-05-19 실로봇 티칭펜던트 측정값)
# photo_motion.py / robot_control.py 가 이 파일을 로드한다.
# 좌표 형식: [x, y, z, rx, ry, rz]  (mm / deg, BASE 기준)
_status: "REAL - 2026-05-19 측정 완료"

# 홈 자세 (관절, deg) - 두산 규칙 §10
home_joint: [0, 0, 90, 0, 90, 0]

# 참고용 홈 작업좌표 (측정값, 코드에서 직접 사용 안 함)
home_posx: [367.48, 6.19, 422.87, 162.14, 179.95, 162.15]

# -----------------------------------------------------------------
# 소품 픽앤플레이스 (robot_control.py)
# -----------------------------------------------------------------

# 소품 스캔 자세 — 카메라가 소품 선반을 내려다보는 위치
scan_posx: [-225.97, -21.78, 720.63, 1.47, -154.73, 85.71]

# 소품 전달 위치 — 사람 손 앞
place_posx: [348.62, -183.20, 293.75, 89.83, -92.18, -90.08]

# 픽앤플 높이 파라미터 (mm)
pick_params:
  approach_z: 80.0     # 소품 상공 접근 높이
  grip_down_z: 30.0    # 소품까지 하강 깊이
  lift_z: 80.0         # 집은 후 들어올림 높이

# -----------------------------------------------------------------
# 동적 촬영 (photo_motion.py)
# -----------------------------------------------------------------

# 촬영 피사체 중심 (사람 얼굴 정면)
subject_center: [525.72, -113.62, 565.21, 65.53, -101.16, -87.38]

# 촬영 4웨이포인트 절대좌표 [x, y, z, rx, ry, rz]
waypoints:
  - [498.84, -142.68, 559.99, 70.26, -100.23, -88.80]   # 1컷
  - [243.71, -128.58, 567.14, 108.47, -103.72, -82.62]  # 2컷
  - [246.36, -152.32, 380.28, 105.19, -78.52, -90.41]   # 3컷
  - [492.15, -175.71, 314.31, 74.28, -66.61, -101.43]   # 4컷

# 안전 작업영역 (BASE 기준 박스, mm). 이 밖으로 나가는 모션은 금지.
workspace_limits:
  x: [-300.0, 750.0]
  y: [-400.0, 400.0]
  z: [100.0, 800.0]

# 모션 파라미터
motion:
  velocity: 40
  acc: 40
  move_time: 5.0       # amovel time(초), §18 패턴
  settle_sec: 0.3      # 캡처 전 흔들림 안정화