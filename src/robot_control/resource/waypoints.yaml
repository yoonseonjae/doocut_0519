# waypoints.yaml  (스캘폴드)
# P3 가 실로봇에서 촬영 4포인트와 안전영역을 측정한 뒤 실값으로 교체.
# photo_motion.py 는 현재 코드 내 WAYPOINT_OFFSETS 기본값을 쓰며,
# 이 파일을 로드하도록 확장 시 동일 키 구조를 사용한다.
_status: "SCAFFOLD - Day3 실로봇 측정 후 확정"

# 피사체 중심 기준 베이스 좌표 [x,y,z,rx,ry,rz] (mm/deg)
subject_center: [500.0, 0.0, 400.0, 0.0, 180.0, 0.0]

# 중심 기준 상대 오프셋 4포인트 [dx,dy,dz,drx,dry,drz]
waypoint_offsets:
  - [-150.0,  120.0,  60.0, 0.0, 0.0, -15.0]   # 좌상
  - [ 150.0,  120.0,  60.0, 0.0, 0.0,  15.0]   # 우상
  - [ 150.0, -120.0, -40.0, 0.0, 0.0,  15.0]   # 우하
  - [-150.0, -120.0, -40.0, 0.0, 0.0, -15.0]   # 좌하

# 안전 작업영역 (베이스 기준 박스, mm). 이 밖으로 나가는 모션은 금지.
workspace_limits:
  x: [200.0, 750.0]
  y: [-400.0, 400.0]
  z: [100.0, 700.0]

# 모션 파라미터
motion:
  velocity: 40
  acc: 40
  move_time: 2.0       # amovel time(초), §18 패턴
  settle_sec: 0.3      # 캡처 전 흔들림 안정화

# 홈 (관절, deg) - 두산 규칙 §10
home_joint: [0, 0, 90, 0, 90, 0]
