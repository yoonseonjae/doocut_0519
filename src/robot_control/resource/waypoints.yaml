# waypoints.yaml
# 로봇 이동 웨이포인트 정의
# joint: [j1, j2, j3, j4, j5, j6] 단위: degree
# task:  [x, y, z, rx, ry, rz]    단위: mm, degree

# 소품 스캔 위치 (카메라가 테이블을 바라보는 자세)
scan_position:
  joint: [-180, -20, 90, 0, 90, 0]

# 사용자 전달 위치 (로봇이 소품을 내려놓는 곳)
# ※ 실제 환경에 맞게 수정 필요
drop_position:
  joint: [-90, -10, 90, 0, 90, 0]

# 홈 포지션 (기존 JReady 그대로)
home:
  joint: [0, 0, 90, 0, 90, 0]
